services:
  - type: web
    name: diamond-queen-frontend
    runtime: static
    region: singapore
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false  # Set to your backend Render URL: https://diamond-queen-backend.onrender.com/api
