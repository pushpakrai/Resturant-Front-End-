services:
  - type: web
    name: diamond-queen-frontend
    runtime: static
    region: singapore
    plan: free
    branch: main
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://restaurant-back-end-ksi0.onrender.com/api  # Your live backend
